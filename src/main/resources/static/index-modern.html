```html
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banking Dashboard</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:"Segoe UI",sans-serif;
      background:linear-gradient(135deg,#667eea,#764ba2);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    header{
      background:white;
      padding:1rem 2rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1{color:#667eea;}

    .user-info{
      display:flex;
      gap:1rem;
      align-items:center;
    }

    .logout-btn{
      padding:0.5rem 1rem;
      background:#dc3545;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    nav{
      background:white;
      padding:1rem;
      display:flex;
      gap:1rem;
      flex-wrap:wrap;
    }

    nav a{
      text-decoration:none;
      color:#667eea;
      font-weight:600;
    }

    main{
      flex:1;
      padding:2rem;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:1.5rem;
    }

    .card{
      background:white;
      padding:1.5rem;
      border-radius:10px;
      text-align:center;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .card i{
      font-size:2rem;
      margin-bottom:10px;
      color:#667eea;
    }

    .card a{
      display:inline-block;
      margin-top:10px;
      padding:8px 15px;
      background:#667eea;
      color:white;
      border-radius:5px;
      text-decoration:none;
    }

    .balance-box{
      grid-column:1/-1;
      background:white;
      padding:1rem;
      border-radius:10px;
      text-align:center;
      font-size:1.2rem;
      font-weight:bold;
    }

    footer{
      text-align:center;
      color:white;
      padding:1rem;
    }
  </style>
</head>

<body>

<header>
  <h1><i class="fas fa-university"></i> Dashboard</h1>

  <div class="user-info">
    <span id="userName"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<nav>
  <a href="balance-enquiry.html">Balance</a>
  <a href="credit-amount.html">Deposit</a>
  <a href="debit-amount.html">Withdraw</a>
  <a href="transfer-amount.html">Transfer</a>
  <a href="chatbot.html">Chatbot</a>
</nav>

<main>

  <div class="balance-box" id="balanceBox">
    Loading balance...
  </div>

  <div class="card">
    <i class="fas fa-wallet"></i>
    <h3>Check Balance</h3>
    <a href="balance-enquiry.html">Open</a>
  </div>

  <div class="card">
    <i class="fas fa-plus-circle"></i>
    <h3>Deposit</h3>
    <a href="credit-amount.html">Open</a>
  </div>

  <div class="card">
    <i class="fas fa-minus-circle"></i>
    <h3>Withdraw</h3>
    <a href="debit-amount.html">Open</a>
  </div>

  <div class="card">
    <i class="fas fa-exchange-alt"></i>
    <h3>Transfer</h3>
    <a href="transfer-amount.html">Open</a>
  </div>

  <div class="card">
    <i class="fas fa-comments"></i>
    <h3>Chat Support</h3>
    <a href="chatbot.html">Open</a>
  </div>

</main>

<footer>
  <p>&copy; 2026 Banking System</p>
</footer>

<script>
const baseUrl="http://localhost:8080";

/* Session Check */
(function(){
  const token=localStorage.getItem("token");
  const loginTime=localStorage.getItem("loginTime");

  if(!token){
    alert("Please login first");
    window.location.href="index.html";
  }

  if(loginTime){
    const diff=(Date.now()-loginTime)/60000;
    if(diff>30){
      localStorage.clear();
      alert("Session expired");
      window.location.href="index.html";
    }
  }
})();

/* Load User Info */
document.getElementById("userName").textContent =
  "👋 " + (localStorage.getItem("accountName") || "User");

/* Fetch Balance */
async function loadBalance(){
  const token=localStorage.getItem("token");

  try{
    const res=await fetch(baseUrl+"/api/user/balance",{
      headers:{Authorization:`Bearer ${token}`}
    });

    const data=await res.json();

    if(res.ok){
      document.getElementById("balanceBox").textContent =
        "Current Balance: ₹ " + data.balance;
    }else{
      document.getElementById("balanceBox").textContent =
        "Unable to fetch balance";
    }

  }catch{
    document.getElementById("balanceBox").textContent =
      "Server error";
  }
}

loadBalance();

/* Logout */
function logout(){
  localStorage.clear();
  window.location.href="index.html";
}
</script>

</body>
</html>
