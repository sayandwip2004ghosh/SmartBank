<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transactions - Banking System</title>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>

  <style>
    .loader{
      display:none;
      text-align:center;
      margin:20px;
    }
  </style>
</head>

<body>

<header class="bg-primary text-white text-center p-3">
  <h1>Transactions</h1>
</header>

<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand" href="dashboard.html">Dashboard</a>
  <button class="btn btn-danger" onclick="logout()">Logout</button>
</nav>

<main class="container mt-4">

  <div id="response"></div>

  <div class="card mb-4">
    <div class="card-header"><h3>Generate Bank Statement</h3></div>
    <div class="card-body">

      <form id="statementForm">

        <div class="mb-3">
          <label>Account Number</label>
          <input type="text" id="accountNumber" class="form-control" required>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label>Start Date</label>
            <input type="date" id="startDate" class="form-control" required>
          </div>

          <div class="col-md-6 mb-3">
            <label>End Date</label>
            <input type="date" id="endDate" class="form-control" required>
          </div>
        </div>

        <button id="submitBtn" class="btn btn-primary">
          Generate Statement
        </button>

      </form>

      <div class="loader" id="loader">
        <div class="spinner-border text-primary"></div>
        <p>Loading transactions...</p>
      </div>

    </div>
  </div>

  <div id="transactions" class="card" style="display:none;">
    <div class="card-header d-flex justify-content-between">
      <h3>Transaction History</h3>
      <button class="btn btn-success btn-sm" onclick="downloadCSV()">
        Download CSV
      </button>
    </div>

    <div class="card-body">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Amount (₹)</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="transactionBody"></tbody>
      </table>
    </div>
  </div>

</main>

<script>
const baseUrl="http://localhost:8080";

/* SESSION CHECK */
(function(){
  const token=localStorage.getItem("token");
  if(!token){
    alert("Please login first");
    window.location.href="index.html";
  }
})();

/* AUTOFILL */
window.onload=()=>{
  const acc=localStorage.getItem("accountNumber");
  if(acc) document.getElementById("accountNumber").value=acc;
};

/* ALERT */
function showResponse(msg,success){
  const div=document.getElementById("response");
  div.innerHTML=`<div class="alert ${success?'alert-success':'alert-danger'}">${msg}</div>`;
  setTimeout(()=>div.innerHTML="",3000);
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href="index.html";
}

/* FORMAT DATE */
function formatDate(d){
  return new Date(d).toLocaleString();
}

/* GLOBAL STORE */
let currentTransactions=[];

document.getElementById("statementForm").addEventListener("submit",async(e)=>{
  e.preventDefault();

  const btn=document.getElementById("submitBtn");
  const loader=document.getElementById("loader");

  const accountNumber=document.getElementById("accountNumber").value;
  const startDate=document.getElementById("startDate").value;
  const endDate=document.getElementById("endDate").value;

  if(startDate>endDate){
    showResponse("Start date cannot be after end date",false);
    return;
  }

  btn.disabled=true;
  loader.style.display="block";

  try{
    const res=await fetch(
      `${baseUrl}/bankStatement?accountNumber=${accountNumber}&startDate=${startDate}&endDate=${endDate}`,
      {headers:{Authorization:"Bearer "+localStorage.getItem("token")}}
    );

    const data=await res.json();

    if(res.ok){
      currentTransactions=data;
      displayTransactions(data);
      showResponse("Statement generated successfully",true);
    }else{
      showResponse("Failed to fetch transactions",false);
    }

  }catch{
    showResponse("Server error",false);
  }

  btn.disabled=false;
  loader.style.display="none";
});

/* DISPLAY */
function displayTransactions(data){
  const body=document.getElementById("transactionBody");
  body.innerHTML="";

  if(data.length===0){
    body.innerHTML="<tr><td colspan='5' class='text-center'>No transactions found</td></tr>";
  }

  data.forEach(t=>{
    const row=document.createElement("tr");
    row.innerHTML=`
      <td>${t.transactionId ?? t.id ?? "—"}</td>
      <td>${t.transactionType}</td>
      <td>${t.amount.toFixed(2)}</td>
      <td>${t.status}</td>
      <td>${formatDate(t.createdAt)}</td>
    `;
    body.appendChild(row);
  });

  document.getElementById("transactions").style.display="block";
}

/* DOWNLOAD CSV */
function downloadCSV(){
  if(currentTransactions.length===0) return;

  let csv="ID,Type,Amount,Status,Date\n";

  currentTransactions.forEach(t=>{
    csv+=`${t.transactionId ?? t.id ?? "—"},${t.transactionType},${t.amount},${t.status},${t.createdAt}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const url=window.URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="transactions.csv";
  a.click();
}
</script>

</body>
</html>
