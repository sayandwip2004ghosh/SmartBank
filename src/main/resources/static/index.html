<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartBank — Sayandwip Ghosh</title>
  <!-- Developer: Sayandwip Ghosh | sayandwipghosh007@gmail.com -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:"Segoe UI",sans-serif;
      background:linear-gradient(135deg,#667eea,#764ba2);
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;padding:2rem;
    }
    .header{text-align:center;color:white;margin-bottom:2rem;}
    .header h1{font-size:2.2rem;}
    .header p{opacity:0.85;margin-top:0.5rem;font-size:0.9rem;}
    .button-container{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;}
    .action-button{
      padding:1rem 2.5rem;border:none;border-radius:8px;
      cursor:pointer;font-weight:600;font-size:1rem;transition:all 0.3s;
    }
    .create-btn{background:#667eea;color:white;}
    .login-btn{background:white;color:#667eea;}
    .action-button:hover{transform:translateY(-2px);box-shadow:0 8px 16px rgba(0,0,0,0.2);}
    .modal{
      display:none;position:fixed;top:0;left:0;
      width:100%;height:100%;background:rgba(0,0,0,0.5);
      justify-content:center;align-items:center;z-index:999;
      overflow-y:auto;padding:1rem;
    }
    .modal.show{display:flex;}
    .modal-content{
      background:white;padding:2rem;border-radius:12px;
      width:100%;max-width:450px;max-height:90vh;overflow-y:auto;
    }
    .modal-content h2{color:#667eea;margin-bottom:1.5rem;text-align:center;}
    .form-group{margin-bottom:1rem;}
    .form-group label{display:block;font-weight:600;margin-bottom:0.4rem;color:#333;}
    .form-group input,.form-group select{
      width:100%;padding:0.75rem;border:2px solid #e0e0e0;
      border-radius:6px;font-size:1rem;outline:none;transition:border-color 0.3s;
    }
    .form-group input:focus,.form-group select:focus{border-color:#667eea;}
    .submit-btn{
      width:100%;padding:0.9rem;background:linear-gradient(135deg,#667eea,#764ba2);
      color:white;border:none;border-radius:8px;font-size:1rem;
      font-weight:700;cursor:pointer;margin-top:0.5rem;transition:opacity 0.2s;
    }
    .submit-btn:hover{opacity:0.9;}
    .submit-btn:disabled{opacity:0.6;cursor:not-allowed;}
    .close-btn{float:right;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#999;}
    .success-message{background:#d4edda;color:#155724;padding:0.8rem;border-radius:6px;margin-bottom:1rem;display:none;}
    .error-message{background:#f8d7da;color:#721c24;padding:0.8rem;border-radius:6px;margin-bottom:1rem;display:none;}
    .pw-wrapper{position:relative;}
    .pw-wrapper input{padding-right:2.5rem;}
    .pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:#999;}
    footer{margin-top:2rem;color:rgba(255,255,255,0.7);font-size:0.8rem;text-align:center;}
  </style>
</head>
<body>
 
<div class="header">
  <h1><i class="fas fa-university"></i> SmartBank</h1>
  <p>Secure Banking by Sayandwip Ghosh</p>
  <p style="font-size:0.75rem;opacity:0.7">sayandwipghosh007@gmail.com</p>
</div>
 
<div class="button-container">
  <button class="action-button create-btn" onclick="openModal('createModal')">
    <i class="fas fa-user-plus"></i> Create Account
  </button>
  <button class="action-button login-btn" onclick="openModal('loginModal')">
    <i class="fas fa-sign-in-alt"></i> Login
  </button>
</div>
 
<!-- CREATE MODAL -->
<div id="createModal" class="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal('createModal')">&times;</button>
    <h2><i class="fas fa-user-plus"></i> Create Account</h2>
    <div class="success-message" id="createSuccess"></div>
    <div class="error-message"   id="createError"></div>
    <div class="form-group"><label>First Name *</label>
      <input type="text" id="firstName" placeholder="Sayandwip"/></div>
    <div class="form-group"><label>Last Name *</label>
      <input type="text" id="lastName" placeholder="Ghosh"/></div>
    <div class="form-group"><label>Other Name</label>
      <input type="text" id="otherName" placeholder="Optional"/></div>
    <div class="form-group"><label>Gender *</label>
      <select id="gender">
        <option value="">-- Select --</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select></div>
    <div class="form-group"><label>Address *</label>
      <input type="text" id="address" placeholder="Your address"/></div>
    <div class="form-group"><label>State *</label>
      <input type="text" id="stateOfOrigin" placeholder="West Bengal"/></div>
    <div class="form-group"><label>Email *</label>
      <input type="email" id="createEmail" placeholder="you@gmail.com"/></div>
    <div class="form-group"><label>Password *</label>
      <div class="pw-wrapper">
        <input type="password" id="createPassword" placeholder="Min 6 characters"/>
        <i class="fas fa-eye pw-eye" onclick="togglePw('createPassword',this)"></i>
      </div></div>
    <div class="form-group"><label>Phone Number *</label>
      <input type="tel" id="phoneNumber" placeholder="9876543210"/></div>
    <div class="form-group"><label>Alternative Phone</label>
      <input type="tel" id="altPhone" placeholder="Optional"/></div>
    <button class="submit-btn" id="createBtn" onclick="createAccount()">
      <i class="fas fa-check-circle"></i> Create Account
    </button>
  </div>
</div>
 
<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal('loginModal')">&times;</button>
    <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
    <div class="success-message" id="loginSuccess"></div>
    <div class="error-message"   id="loginError"></div>
    <div class="form-group"><label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@gmail.com"/></div>
    <div class="form-group"><label>Password</label>
      <div class="pw-wrapper">
        <input type="password" id="loginPassword" placeholder="Your password"/>
        <i class="fas fa-eye pw-eye" onclick="togglePw('loginPassword',this)"></i>
      </div></div>
    <button class="submit-btn" id="loginBtn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
    <p style="text-align:center;margin-top:1rem;color:#666;font-size:0.9rem">
      No account?
      <a href="#" onclick="closeModal('loginModal');openModal('createModal')"
         style="color:#667eea;font-weight:600">Create one here</a>
    </p>
  </div>
</div>
 
<footer>© 2026 Sayandwip Ghosh Banking System</footer>
 
<script>
const BASE = "http://localhost:8080";
 
function openModal(id)  { document.getElementById(id).classList.add("show"); }
function closeModal(id) { document.getElementById(id).classList.remove("show"); }
 
function togglePw(id, icon) {
  const inp = document.getElementById(id);
  inp.type = inp.type === "password" ? "text" : "password";
  icon.classList.toggle("fa-eye");
  icon.classList.toggle("fa-eye-slash");
}
 
function showMsg(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 4000);
}
 
async function createAccount() {
  const btn = document.getElementById("createBtn");
  const firstName  = document.getElementById("firstName").value.trim();
  const lastName   = document.getElementById("lastName").value.trim();
  const otherName  = document.getElementById("otherName").value.trim();
  const gender     = document.getElementById("gender").value;
  const address    = document.getElementById("address").value.trim();
  const state      = document.getElementById("stateOfOrigin").value.trim();
  const email      = document.getElementById("createEmail").value.trim();
  const password   = document.getElementById("createPassword").value;
  const phone      = document.getElementById("phoneNumber").value.trim();
  const altPhone   = document.getElementById("altPhone").value.trim();
 
  if (!firstName||!lastName||!gender||!address||!state||!email||!password||!phone) {
    showMsg("createError","⚠️ Please fill all required fields."); return;
  }
 
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
 
  try {
    const res  = await fetch(`${BASE}/api/user`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        firstName, lastName, otherName, gender, address,
        stateOfOrigin: state, email, password,
        phoneNumber: phone, alternativePhoneNumber: altPhone
      })
    });
    const data = await res.json();
 
    if (res.ok) {
      showMsg("createSuccess",
        `✅ Account Created! Number: ${data.accountInfo?.accountNumber}`);
      setTimeout(() => { closeModal("createModal"); openModal("loginModal"); }, 2500);
    } else {
      showMsg("createError", "❌ " + (data.responseMessage || "Failed"));
    }
  } catch {
    showMsg("createError","❌ Cannot connect to server. Is Spring Boot running?");
  }
 
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-check-circle"></i> Create Account';
}
 
async function doLogin() {
  const btn      = document.getElementById("loginBtn");
  const email    = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
 
  if (!email || !password) {
    showMsg("loginError","⚠️ Enter email and password"); return;
  }
 
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
 
  try {
    const res  = await fetch(`${BASE}/api/user/login`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
 
    if (res.ok) {
      // ✅ FIXED: read data.token (not data.responseMessage)
      localStorage.setItem("token",         data.token);
      localStorage.setItem("accountNumber", data.accountInfo?.accountNumber || "");
      localStorage.setItem("accountName",   data.accountInfo?.accountName   || "");
      localStorage.setItem("userRole",      data.accountInfo?.role          || "");
      localStorage.setItem("loginTime",     Date.now());
 
      showMsg("loginSuccess","✅ Login successful! Redirecting...");
 
      setTimeout(() => {
        if (data.accountInfo?.role === "ROLE_ADMIN") {
          window.location.href = "admin-dashboard.html";
        } else {
          window.location.href = "dashboard.html";
        }
      }, 1000);
    } else {
      showMsg("loginError","❌ " + (data.responseMessage || "Invalid credentials"));
    }
  } catch {
    showMsg("loginError","❌ Cannot connect to server. Is Spring Boot running?");
  }
 
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
}
</script>
</body>
</html>
