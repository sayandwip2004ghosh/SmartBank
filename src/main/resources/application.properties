# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=banking-system

# ── Server (Railway & Render both inject PORT) ────────────────────────────────
server.address=0.0.0.0
server.port=${PORT:8080}

# ── Database (PostgreSQL — Render free tier) ──────────────────────────────────
# Set DATABASE_URL in Render Environment panel (Internal Database URL from Render Postgres)
# Format: postgresql://user:password@host/dbname
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:smartbank}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ── Email (Gmail SMTP) ────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:sayandwipghosh007@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckJhbmtpbmdTeXN0ZW0xMjM0NTY=}
app.jwt.expiration=86400000

# ── Actuator (health check for Railway & Render) ──────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Async thread pool ─────────────────────────────────────────────────────────
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5

# ── Production logging ────────────────────────────────────────────────────────
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=INFO

