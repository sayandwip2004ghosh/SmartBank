version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: smartbank-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartbank
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: smartbank-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:${PGPASSWORD:-changeme}@db:5432/smartbank
      JWT_SECRET: ${JWT_SECRET:-bXlTdXBlclNlY3JldEtleUZvckJhbmtpbmdTeXN0ZW0xMjM0NTY=}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      PORT: 8080

volumes:
  db_data:
